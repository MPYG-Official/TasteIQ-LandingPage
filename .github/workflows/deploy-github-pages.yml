name: Deploy GitHub Pages

on:
  push:
    branches: [backup-branch]
    paths:
      - 'nextjs-setup/**'
      - '.github/workflows/deploy-github-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: nextjs-setup/package-lock.json

      - name: Install dependencies
        working-directory: nextjs-setup
        run: npm ci

      - name: Build static site (custom domain at root)
        working-directory: nextjs-setup
        env:
          NEXT_PUBLIC_SITE_URL: https://tasteiq.in
          NEXT_PUBLIC_BASE_PATH: ''
          STATIC_EXPORT: '1'
          SKIP_DATABASE: '1'
        run: npm run build:static

      - name: Prepare artifact (CNAME + Jekyll bypass)
        run: |
          echo "tasteiq.in" > nextjs-setup/out/CNAME
          touch nextjs-setup/out/.nojekyll
          test -f nextjs-setup/out/index.html
          ls nextjs-setup/out/_next/static/css/*.css >/dev/null
          head -1 nextjs-setup/out/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: nextjs-setup/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
